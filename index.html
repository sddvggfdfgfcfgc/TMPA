<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Time‑Sequence Mirror Permutation Algorithm</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f4f6f8;padding:30px;max-width:700px;margin:0 auto}
.box{background:white;padding:24px;border-radius:16px;box-shadow:0 4px 12px #0001}
h2{text-align:center;margin-bottom:8px;color:#222;font-size:18px}
.desc{text-align:center;font-size:13px;color:#888;margin-bottom:20px}
textarea{width:100%;height:120px;padding:12px;border-radius:8px;border:1px solid #ccc;margin:10px 0;font-size:15px}
.btns{display:flex;gap:12px;margin:10px 0}
button{flex:1;padding:12px;border:none;border-radius:8px;background:#2d7dff;color:white;font-size:16px;cursor:pointer}
#dec{background:#22bb5b}
#out{background:#f9f9f9}
.copyright{margin-top:20px;text-align:center;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="box">
  <h2>Time‑Sequence Mirror Permutation Algorithm</h2>
  <div class="desc">原创 TMPA 时序镜像置换算法</div>
  <textarea id="txt" placeholder="输入明文 / 密文"></textarea>
  <div class="btns">
    <button onclick="enc()">加密</button>
    <button id="dec" onclick="dec()">解密</button>
  </div>
  <textarea id="out" readonly placeholder="处理结果"></textarea>
  <div class="copyright">版权所有 © bilibili UP主 canfhfgj</div>
</div>

<script>
function enc(){
  let str = document.getElementById("txt").value;
  let result = "";
  for(let i = 0; i < str.length; i++){
    let code = str.charCodeAt(i);
    let mix = code ^ (i + 128);
    result += mix.toString(16).padStart(5, '0');
  }
  document.getElementById("out").value = result;
}

function dec(){
  let str = document.getElementById("txt").value;
  if(str.length % 5 !== 0){
    document.getElementById("out").value = "格式错误";
    return;
  }
  let result = "";
  for(let i = 0; i < str.length; i += 5){
    let hex = str.slice(i, i + 5);
    let num = parseInt(hex, 16);
    let origin = num ^ ((i / 5) + 128);
    result += String.fromCharCode(origin);
  }
  document.getElementById("out").value = result;
}
</script>
</body>
</html>
